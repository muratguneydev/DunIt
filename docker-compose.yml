services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5000:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "pgrep nginx > /dev/null 2>&1"]
      interval: 5s
      timeout: 3s
      retries: 5

  test:
    build:
      context: .
      dockerfile: Dockerfile.dev

  e2e:
    build:
      context: .
      dockerfile: Dockerfile.e2e
    depends_on:
      web:
        condition: service_healthy
    environment:
      - PLAYWRIGHT_BASE_URL=http://web
      - HEADED=1
      - PLAYWRIGHT_SLOW_MO=500
    ports:
      - "7900:7900"
    volumes:
      - ./test-results:/results
