services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5000:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "pgrep nginx > /dev/null 2>&1"]
      interval: 5s
      timeout: 3s
      retries: 5

  test:
    build:
      context: .
      dockerfile: Dockerfile.dev
    volumes:
      - ./src:/app/src
      - ./tests/DunIt.Testing:/app/tests/DunIt.Testing
      - ./tests/DunIt.UnitTests:/app/tests/DunIt.UnitTests

  deploy:
    profiles: [deploy]
    build:
      context: .
      dockerfile: Dockerfile.deploy
    volumes:
      - ${SERVICE_ACCOUNT_KEY:-./service-account-placeholder.json}:/app/service-account.json:ro
    environment:
      - GOOGLE_APPLICATION_CREDENTIALS=/app/service-account.json

  e2e:
    build:
      context: .
      dockerfile: Dockerfile.e2e
    depends_on:
      web:
        condition: service_healthy
    environment:
      - PLAYWRIGHT_BASE_URL=http://web
      - HEADED=1
      - PLAYWRIGHT_SLOW_MO=500
    ports:
      - "7900:7900"
    volumes:
      - ./tests/DunIt.IntegrationTests:/app/tests/DunIt.IntegrationTests
      - ./test-results:/results
